repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

  # Runs against frontend/node_modules (requires `npm ci` already run there)
  # rather than letting pre-commit manage its own Node runtime — one less
  # thing to keep in sync with package.json, and one less Node download.
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: frontend/node_modules/.bin/eslint --ext ts,tsx --max-warnings 0
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
